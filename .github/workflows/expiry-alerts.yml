# Calls production expiry-alert cron every 15 minutes (UTC).
# Secrets (repo Settings → Secrets and variables → Actions):
#   CRON_SECRET  — same value as Vercel / .env.local CRON_SECRET
#   CRON_BASE_URL — production origin, e.g. https://welddoc.in
#                  (or https://your-app.vercel.app for the Production hostname)
name: Expiry alerts cron

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: expiry-alerts-cron
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger expiry alerts
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CRON_BASE_URL: ${{ secrets.CRON_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ] || [ -z "${CRON_BASE_URL:-}" ]; then
            echo "Missing CRON_SECRET or CRON_BASE_URL secret."
            exit 1
          fi
          BASE="${CRON_BASE_URL%/}"
          URL="${BASE}/api/cron/expiry-alerts"
          echo "POST-equivalent GET → ${URL}"
          HTTP_CODE=$(curl -sS -o /tmp/cron-body.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Accept: application/json" \
            "${URL}")
          echo "HTTP ${HTTP_CODE}"
          cat /tmp/cron-body.json || true
          echo
          if [ "${HTTP_CODE}" != "200" ]; then
            exit 1
          fi

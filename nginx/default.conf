# HTTP — ACME challenge + redirect everything else to HTTPS
server {
    listen 80;
    server_name welddoc.in www.welddoc.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://welddoc.in$request_uri;
    }
}

# HTTPS — certificates created by Certbot on the EC2 host
server {
    listen 443 ssl;
    http2 on;
    server_name welddoc.in www.welddoc.in;

    ssl_certificate /etc/letsencrypt/live/welddoc.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/welddoc.in/privkey.pem;

    # NDT uploads can be up to 25 MB per request
    client_max_body_size 100M;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
